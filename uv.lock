version = 1
requires-python = ">=3.11"

[[package]]
name = "sql-repair-env"
version = "1.0.0"
source = { virtual = "." }
dependencies = [
    { name = "fastapi" },
    { name = "uvicorn" },
    { name = "pydantic" },
    { name = "pandas" },
    { name = "openai" },
    { name = "httpx" },
    { name = "pyyaml" },
    { name = "openenv-core" },
]

[[package]]
